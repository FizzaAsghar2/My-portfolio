<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>
  <style>

    /* HEADER */
 header {
  display: flex;
  flex-direction: column;       /* stack h1 and nav vertically */
  align-items: center;          /* center horizontally */
  justify-content: flex-start;  /* start from top (not middle) */
  padding-top: 100px;           /* 👈 pushes it a bit down */
  border-bottom: 2px solid gray;
  background-image: linear-gradient(23deg, rgb(233, 95, 222), rgb(62, 137, 177));
  height: 100vh;                 /* half screen height (adjust if needed) */
}


    header h1 {
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }

    nav ul {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav li {
      margin-right: 25px;
      font-size: 20px;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }

  nav a {
  text-decoration: none;
  color: white;
  display: inline-block;         /* 👈 important so transform works */
  transition: all 0.2s ease;     /* smooth animation */
}

   nav a:hover {
  color: rgb(125, 191, 208);
  text-shadow: 2px 2px 10px white;
  transform: scale(1.1);         /* 👈 grows slightly on hover */
}
    /* 👇 This part makes it grow slightly when clicked */
nav a:active {
  transform: scale(1.25);        /* 👈 grows a bit more when clicked */
}
nav a:focus {
  transform: scale(1.2);
}


    /* FOOTER */
    footer {
      display: flex;
      justify-content: space-around;
      background-color: aliceblue;
      padding: 30px 0;
      border-top: 2px solid gray;
    }

    footer div {
      border: 2px solid black;
      padding: 10px;
      background-color: white;
      border-radius: 8px;
    }

    footer ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    footer ul li {
      margin: 10px 0;
    }

    footer ul li a {
      text-decoration: none;
      color: black;
      transition: 0.3s;
    }

    footer ul li a:hover {
      color: rgb(62, 137, 177);
      text-shadow: 1px 1px 5px gray;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Welcome to Homepage</h1>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav>
  </header>

  <!-- FOOTER -->
  <footer>
    <div>
      <ul>
        <li><a href="#">aaaaa</a></li>
        <li><a href="#">bbbbb</a></li>
        <li><a href="#">ccccc</a></li>
      </ul>
    </div>
    <div>
      <ul>
        <li><a href="#">ddddd</a></li>
        <li><a href="#">eeeee</a></li>
        <li><a href="#">fffff</a></li>
      </ul>
    </div>
    <div>
      <ul>
        <li><a href="#">ggggg</a></li>
        <li><a href="#">hhhhhh</a></li>
        <li><a href="#">iiiiii</a></li>
      </ul>
    </div>
    <div>
      <ul>
        <li><a href="#">jjjjjjjj</a></li>
        <li><a href="#">kkkkkk</a></li>
        <li><a href="#">llll</a></li>
      </ul>
    </div>
  </footer>

</body>
</html>
