<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Celebrity Twin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #ffecd2, #fcb69f, #fad0c4);
    background-size: 400% 400%;
    animation: gradientMove 8s ease infinite;
    overflow: hidden;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  h2 {
    font-size: 28px;
    color: #442222;
    margin-bottom: 35px;
    text-shadow: 0 3px 10px rgba(255,255,255,0.8);
    animation: fadeIn 1.5s ease-in-out;
  }

  .container {
    display: flex;
    gap: 50px;
    align-items: center;
    justify-content: center;
  }

  .photo-box {
    background: rgba(255,255,255,0.85);
    border: 3px solid #ff8f8f;
    border-radius: 25px;
    padding: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    position: relative;
  }

  .photo-box:hover {
    transform: scale(1.08);
    box-shadow: 0 20px 50px rgba(255,130,130,0.6);
  }

  .photo-box img {
    width: 200px;
    height: 200px;
    border-radius: 18px;
    object-fit: cover;
  }

  p {
    margin-top: 25px;
    color: #222;
    font-weight: 500;
    letter-spacing: 0.5px;
    font-size: 18px;
    animation: fadeIn 2s ease-in-out;
  }

  /* Floating emojis */
  .emoji {
    position: absolute;
    font-size: 40px;
    animation: float 6s ease-in-out infinite;
    opacity: 0.8;
  }
  .emoji:nth-child(1) { top: 8%; left: 12%; animation-delay: 0s; }
  .emoji:nth-child(2) { top: 80%; left: 18%; animation-delay: 2s; }
  .emoji:nth-child(3) { top: 15%; right: 15%; animation-delay: 4s; }
  .emoji:nth-child(4) { bottom: 12%; right: 22%; animation-delay: 3s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-18px); }
  }

  /* Soft fade-in animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Glow animation for realism */
  .photo-box::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 25px;
    background: radial-gradient(circle at top left, rgba(255,255,255,0.3), transparent 60%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .photo-box:hover::after {
    opacity: 1;
  }

</style>
</head>
<body>

  <div class="emoji">💖</div>
  <div class="emoji">✨</div>
  <div class="emoji">🌟</div>
  <div class="emoji">💫</div>

  <h2>ur celeb twin is...</h2>

  <div class="container">
    <div class="photo-box">
      <img src="cccc1.jpg" alt="User lookalike">
    </div>
    <div class="photo-box">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/8b/Katrina_Kaif_promoting_Bharat_in_2019.jpg" alt="Celebrity">
    </div>
  </div>

  <p>wow what a match 💫</p>

</body>
</html>
