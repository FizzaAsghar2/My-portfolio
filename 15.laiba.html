<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styling</title>
    <style>
    ol{list-style-type: lower-greek;}
    /* ul{list-style-type: square;} */
    /* ul ... list style type...none and padding also null if we want to exert image*/
     ul{list-style-type: none;
     padding: 0}*/
     ul li{
        position: relative;
        padding-left:25px ;
        margin: 10px 0;
     }
     ul li :: before{
        content: "";
        position: absolute;  /*we ix the icon at fix place*/
        left: 0;    /*icon is on left*/
        top: 50%;
     }
    </style>
</head>
<body>
    <ol>
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ol>
    <ul>
        <li>black</li>
        <li>red</li>
        <li>maroon</li>
    </ul>
</body>
</html>
