<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Purple</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    nav { background: #4B004B; text-align: center; padding: 15px; }
    nav a { color: white; margin: 0 20px; text-decoration: none; font-weight: bold; }
    nav a:hover { text-decoration: underline; }

    .hero {
      background: #4B004B; color: white;
      width: 60%; margin: 40px auto; padding: 40px;
      border-radius: 10px; text-align: center;
    }
    .hero button {
      background: #E91E63; color: white;
      border: none; padding: 10px 20px;
      border-radius: 5px; cursor: pointer;
    }
    .hero button:hover { background: #C2185B; }

    .section { text-align: center; margin: 40px 0; }
    footer { background: #1A001A; color: white; text-align: center; padding: 15px; }
  </style>
</head>
<body>
  <nav>
    <a href="#">Home</a><a href="#">About</a><a href="#">Team</a>
  </nav>
  <div class="hero">
    <h1>Welcome to Demo Project</h1>
    <p>A modern web experience built with React.</p>
    <button>Meet the Team</button>
  </div>
  <div class="section"><h2>Why Choose Us?</h2></div>
  <footer>© 2025 Demo Project. All rights reserved.</footer>
</body>
</html>
